version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: trc-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: trc-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - trc-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.1
    container_name: trc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - trc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: trc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - trc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/media-uploads;
      /usr/bin/mc anonymous set public myminio/media-uploads;
      exit 0;
      "
    networks:
      - trc-network

  # Applications Services Layer
  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: trc-identity-service
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/user_db
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trc-network

  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    container_name: trc-content-service
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/content_db
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - trc-network

  feed-service:
    build:
      context: ./services/feed-service
      dockerfile: Dockerfile
    container_name: trc-feed-service
    environment:
      - PORT=3003
      - REDIS_URL=${REDIS_URL}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - trc-network

  community-service:
    build:
      context: ./services/community-service
      dockerfile: Dockerfile
    container_name: trc-community-service
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/moderation_db
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trc-network

  # Gateway
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: trc-api-gateway
    environment:
      - PORT=8000
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - CONTENT_SERVICE_URL=http://content-service:3002
      - FEED_SERVICE_URL=http://feed-service:3003
      - COMMUNITY_SERVICE_URL=http://community-service:3004
    ports:
      - "8000:8000"
    depends_on:
      - identity-service
      - content-service
      - feed-service
      - community-service
    networks:
      - trc-network

  # Frontends
  web-app:
    build:
      context: ./apps/web-app
      dockerfile: Dockerfile
    container_name: trc-web-app
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - trc-network

  admin-panel:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile
    container_name: trc-admin-panel
    ports:
      - "3005:80"
    depends_on:
      - api-gateway
    networks:
      - trc-network

networks:
  trc-network:
    name: trc-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  es_data:
  minio_data:
